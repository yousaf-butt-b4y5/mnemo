<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnemo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'><rect width='20' height='20' rx='5' fill='%23cc785c'/><circle cx='10' cy='5.5' r='3' fill='white' opacity='.95'/><circle cx='4' cy='15.5' r='3' fill='white' opacity='.95'/><circle cx='16' cy='15.5' r='3' fill='white' opacity='.95'/><line x1='10' y1='8.5' x2='4' y2='12.5' stroke='white' stroke-width='1.3' stroke-linecap='round' opacity='.5'/><line x1='10' y1='8.5' x2='16' y2='12.5' stroke='white' stroke-width='1.3' stroke-linecap='round' opacity='.5'/><line x1='4' y1='15.5' x2='16' y2='15.5' stroke='white' stroke-width='1.3' stroke-linecap='round' opacity='.5'/></svg>">
<style>
:root{
  --rail:#191613; --side:#201c18; --main:#26221e;
  --card:#2e2a24; --card2:#37322b; --input:#1b1814;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.12);
  --text:#ece8e1; --muted:#a8a298; --hint:#6e685e;
  --accent:#cc785c; --accent-bg:rgba(204,120,92,.15);
  --green:#5fa372; --red:#cc6b5e; --amber:#d9a441; --blue:#6a93c0;
  --work:#d9a441; --work-bg:rgba(217,164,65,.13);
  --font:'Segoe UI Variable','Segoe UI',system-ui,sans-serif;
  --serif:'Georgia','Times New Roman',serif;
  --mono:'Cascadia Code','Fira Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--main);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#3a3b45;border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

.app{display:grid;grid-template-columns:68px 248px 1fr;height:100vh}

/* ---- Rail (vault "servers") ---- */
.rail{background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:10px}
.rail .logo{width:44px;height:44px;border-radius:13px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.vbtn{position:relative;width:46px;height:46px;border-radius:50%;background:var(--side);
  display:flex;align-items:center;justify-content:center;font-size:20px;transition:.18s;color:var(--muted)}
.vbtn:hover,.vbtn.active{border-radius:16px;background:var(--accent);color:#fff}
.vbtn.active.work{background:var(--work);color:#241a05}
.vbtn .ind{position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:5px;height:0;
  background:#fff;border-radius:0 4px 4px 0;transition:.18s}
.vbtn.active .ind{height:28px}
.vbtn .cnt{position:absolute;bottom:-2px;right:-2px;background:var(--red);color:#fff;font-size:10px;
  font-weight:700;border-radius:9px;padding:1px 5px;border:2px solid var(--rail)}
.rail .spacer{flex:1}
.rail .dot{width:10px;height:10px;border-radius:50%;background:var(--muted)}
.rail .dot.up{background:var(--green)} .rail .dot.down{background:var(--red)}

/* ---- Sidebar (folders) ---- */
.sidebar{background:var(--side);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.side-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.side-head b{font:700 11.5px var(--font);letter-spacing:.13em;text-transform:uppercase;display:block;line-height:1.2;color:var(--text)}
.side-head .vl{font-size:11px;color:var(--hint);letter-spacing:.02em;margin-top:1px}
.search{padding:10px 12px}
.search input{width:100%;background:var(--input);border:1px solid transparent;border-radius:8px;
  color:var(--text);font-size:12.5px;padding:8px 11px;outline:none}
.search input:focus{border-color:var(--accent)}
.nav{padding:0 8px}.folders{padding:2px 8px 12px;overflow-y:auto;flex:1}
.fhead{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--hint);text-transform:uppercase;padding:12px 10px 5px}
.item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:7px 10px;border-radius:7px;
  color:var(--muted);font-size:13.5px;transition:.1s}
.item:hover{background:var(--card);color:var(--text)}
.item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.item .ico{width:18px;text-align:center;flex-shrink:0}
.item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .cnt{font-size:10.5px;background:var(--card);border-radius:6px;padding:1px 7px;color:var(--muted)}
.item.depth1{padding-left:24px;font-size:13px}

/* ---- Main ---- */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{height:48px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--border)}
.topbar h2{font-size:15px;font-weight:600}.topbar .meta{font-size:12px;color:var(--hint);margin-left:auto}
.work-banner{display:none;background:var(--work-bg);color:var(--work);font-size:12px;text-align:center;
  padding:5px;font-weight:500;border-bottom:1px solid rgba(232,170,64,.2)}
body.work .work-banner{display:block}
.content{flex:1;overflow-y:auto;padding:18px 20px}

/* cards */
.cards{display:flex;flex-direction:column;gap:7px}
.card{background:var(--card);border:1px solid transparent;border-radius:11px;padding:12px 14px;
  cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:.1s}
.card:hover{background:var(--card2);border-color:var(--border2)}
.card .cico{width:34px;height:34px;border-radius:9px;background:var(--input);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.card.secret .cico{background:var(--work-bg)}
.card .cb{flex:1;min-width:0}
.card .ct{font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .cs{font-size:12px;color:var(--muted);margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .ctags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.tag{font-size:10px;background:var(--input);border-radius:9px;padding:2px 8px;color:var(--muted)}
.card.secret .tag.k{background:var(--work-bg);color:var(--amber)}
.card .cp{font-size:10px;color:var(--hint);flex-shrink:0;margin-left:auto}
.empty{text-align:center;color:var(--hint);padding:64px 20px}
.empty .big{font-size:38px;opacity:.4;margin-bottom:12px}

/* detail */
.detail{max-width:780px}
.dhead{display:flex;gap:13px;align-items:flex-start;margin-bottom:14px}
.dhead .di{width:42px;height:42px;border-radius:11px;background:var(--input);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px}
.detail.secret .di{background:var(--work-bg)}
.dhead h2{font:600 20px var(--serif);letter-spacing:.01em}.dhead .dsub{font-size:12px;color:var(--muted);margin-top:4px}
.dhead .da{margin-left:auto;display:flex;gap:6px}
.btn{background:var(--card);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:500;
  color:var(--text);transition:.1s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--card2)}
.btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:#9a8cf5}
.btn.danger:hover{background:var(--red);color:#fff}
.dtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.body{background:var(--input);border:1px solid var(--border);border-radius:10px;padding:15px 17px;
  font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto}
.body.code{font-family:var(--mono);font-size:12.5px}
a.lk{color:var(--blue)}

/* secret fields */
.sfields{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
.sfield{background:var(--input);border:1px solid var(--border);border-radius:9px;padding:11px 13px;
  display:flex;align-items:center;gap:11px}
.sfield .sl{font-size:11px;color:var(--muted);width:96px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em}
.sfield .sv{flex:1;font-family:var(--mono);font-size:13px;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;letter-spacing:1px}.sfield .sv.masked{letter-spacing:3px}
.sbtn{background:var(--card);border-radius:6px;padding:5px 9px;font-size:13px;color:var(--muted)}
.sbtn:hover{background:var(--accent-bg);color:var(--accent)}
.snote{font-size:11px;color:var(--hint);margin-top:11px;display:flex;align-items:center;gap:6px}

/* edit form */
.edit{display:flex;flex-direction:column;gap:10px;max-width:780px}
.edit label{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:-4px}
.edit input,.edit textarea,.srow input,.srow select{background:var(--input);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:13.5px;padding:9px 12px;outline:none;width:100%}
.edit input:focus,.edit textarea:focus,.srow input:focus{border-color:var(--accent)}
.edit textarea{min-height:160px;resize:vertical;line-height:1.5}
.srow{display:flex;gap:7px;align-items:center}.srow input.lbl{flex:0 0 130px}.srow select{flex:0 0 110px}
.srow .x{flex:0 0 auto;color:var(--hint);padding:6px 8px}.srow .x:hover{color:var(--red)}
.erow{display:flex;gap:8px;margin-top:4px}

/* composer */
.composer{flex-shrink:0;padding:12px 18px 16px;background:var(--main);border-top:1px solid var(--border)}
.comp-box{background:var(--input);border:1px solid var(--border2);border-radius:13px;
  display:flex;align-items:flex-end;gap:8px;padding:8px 10px 8px 14px;transition:.15s}
.comp-box:focus-within{border-color:var(--accent)}
#paste{flex:1;background:none;border:none;color:var(--text);font-size:14px;resize:none;outline:none;
  max-height:160px;line-height:1.5;padding:5px 0}
#paste::placeholder{color:var(--hint)}
.comp-box .up{font-size:18px;color:var(--muted);padding:6px;border-radius:8px}.comp-box .up:hover{color:var(--text)}
.comp-box .send{background:var(--accent);color:#fff;border-radius:9px;padding:8px 16px;font-weight:600;font-size:13px}
.comp-box .send:hover{background:#9a8cf5}.comp-box .send:disabled{opacity:.5;cursor:default}
.status{font-size:11.5px;color:var(--hint);min-height:16px;margin-top:7px;padding:0 4px;display:flex;align-items:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);
  border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;
  transition:.25s;pointer-events:none;z-index:100;display:flex;gap:8px;align-items:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast .clr{color:var(--amber);font-size:11px}
.drag #paste-wrap{outline:2px dashed var(--accent)}
</style>
</head>
<body>
<div class="app" id="app">

  <nav class="rail">
    <div class="logo"><svg viewBox="0 0 20 20" fill="none" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="5.5" r="3" fill="white" opacity=".95"/><circle cx="4" cy="15.5" r="3" fill="white" opacity=".95"/><circle cx="16" cy="15.5" r="3" fill="white" opacity=".95"/><line x1="10" y1="8.5" x2="4" y2="12.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".5"/><line x1="10" y1="8.5" x2="16" y2="12.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".5"/><line x1="4" y1="15.5" x2="16" y2="15.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".5"/></svg></div>
    <div id="rail"></div>
    <div class="spacer"></div>
    <span class="dot" id="conn-dot" title="connection"></span>
  </nav>

  <aside class="sidebar">
    <div class="side-head"><b>Mnemo</b><span class="vl" id="vault-label">personal vault</span></div>
    <div class="search"><input id="search" placeholder="Search everything…" oninput="onSearch()" autocomplete="off"></div>
    <div class="nav">
      <button class="item active" data-view="recent" onclick="setView('recent')"><span class="ico">🕘</span><span class="nm">Recent</span></button>
      <button class="item" data-view="all" onclick="setView('all')"><span class="ico">🗃️</span><span class="nm">All notes</span><span class="cnt" id="all-cnt">0</span></button>
    </div>
    <div class="fhead">Folders</div>
    <div class="folders" id="folders"></div>
  </aside>

  <main class="main">
    <div class="work-banner">🔒 WORK VAULT — stays local · no cloud AI · company-confidential</div>
    <div class="topbar"><h2 id="view-title">Recent</h2><span class="meta" id="view-meta">0 items</span></div>
    <div class="content" id="content"></div>
    <div class="composer">
      <div class="comp-box" id="paste-wrap">
        <textarea id="paste" rows="1" placeholder="Paste anything — note, link, code, a login block…  (Enter to capture · Shift+Enter = newline)"></textarea>
        <label class="up" title="Upload file / PDF">📎<input type="file" id="file-in" onchange="doUpload(this)" hidden></label>
        <button class="send" id="cap-btn" onclick="doCapture()">Capture</button>
      </div>
      <div class="status" id="status-msg"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const API = location.origin;
const TYPE_ICON = {note:'📝',link:'🔗',code:'💻',doc:'📄',task:'✅',reference:'📚',credential:'🔑',file:'📎'};
const state = {vault:'personal', vaults:[], tree:[], view:'recent', activePath:'', query:'', detail:null};
let entries = [];

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function clean(s){return (s||'').replace(/\\?\\?id=[0-9a-f]{8}-[0-9a-f-]{27,}/gi,'').replace(/\s+/g,' ').trim()}
function toast(m,c){const t=document.getElementById('toast');t.innerHTML=esc(m)+(c?` <span class="clr">${esc(c)}</span>`:'');
  t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600)}
async function api(p,o){const r=await fetch(API+p,o);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||r.status);return r.json()}

async function checkHealth(){const d=document.getElementById('conn-dot');
  try{await api('/api/health');d.className='dot up'}catch{d.className='dot down'}}

async function loadVaults(){
  const d=await api('/api/vaults');state.vaults=d.vaults;
  const rail=document.getElementById('rail');rail.innerHTML='';
  d.vaults.forEach(v=>{
    const b=document.createElement('button');
    b.className='vbtn'+(v.name===state.vault?' active':'')+(v.name==='work'?' work':'');
    b.title=v.name;
    b.innerHTML=`<span class="ind"></span>${v.name==='work'?'🔒':'👤'}`+(v.entries?`<span class="cnt">${v.entries}</span>`:'');
    b.onclick=()=>switchVault(v.name);rail.appendChild(b);
  });
  const cur=d.vaults.find(v=>v.name===state.vault)||{};
  document.getElementById('vault-label').textContent=state.vault+' vault';
  document.getElementById('all-cnt').textContent=cur.entries||0;
}
function switchVault(n){state.vault=n;state.view='recent';state.activePath='';state.query='';
  document.getElementById('search').value='';document.body.classList.toggle('work',n==='work');
  refreshAll().then(()=>showList())}

async function loadTree(){
  const d=await api('/api/tree?vault='+state.vault);state.tree=d.tree;
  const el=document.getElementById('folders');el.innerHTML='';
  state.tree.forEach(t=>{
    const depth=Math.min((t.path.match(/\//g)||[]).length,1);
    const name=t.path.split('/').pop();
    const b=document.createElement('button');
    b.className='item depth'+depth;b.dataset.path=t.path;
    b.innerHTML=`<span class="ico">${depth?'#':'📁'}</span><span class="nm">${esc(name)}</span><span class="cnt">${t.count}</span>`;
    b.onclick=()=>{state.view='folder';state.activePath=t.path;state.query='';
      document.getElementById('search').value='';loadEntries().then(showList)};
    el.appendChild(b);
  });
  markNav();
}
function markNav(){
  document.querySelectorAll('.nav .item').forEach(n=>n.classList.toggle('active',
    (state.view==='recent'||state.view==='all')&&n.dataset.view===state.view));
  document.querySelectorAll('.folders .item').forEach(n=>n.classList.toggle('active',
    state.view==='folder'&&n.dataset.path===state.activePath));
}
function setView(v){state.view=v;state.activePath='';state.query='';
  document.getElementById('search').value='';loadEntries().then(showList)}

async function loadEntries(){
  let p=`/api/entries?vault=${state.vault}`;
  if(state.query)p+='&q='+encodeURIComponent(state.query);
  else if(state.view==='folder'&&state.activePath)p+='&tree='+encodeURIComponent(state.activePath);
  entries=(await api(p)).entries;
}

function showList(){
  state.detail=null;markNav();
  const c=document.getElementById('content');
  document.getElementById('view-title').textContent =
    state.query?`Search: "${state.query}"`:(state.view==='folder'?state.activePath:(state.view==='all'?'All notes':'Recent'));
  document.getElementById('view-meta').textContent=entries.length+' item'+(entries.length===1?'':'s');
  if(!entries.length){c.innerHTML=`<div class="empty"><div class="big">🗂️</div>Nothing here yet.<br>Paste anything below — Mnemo files it for you.</div>`;return}
  const w=document.createElement('div');w.className='cards';
  entries.forEach(e=>{
    const card=document.createElement('div');card.className='card'+(e.is_secret?' secret':'');
    const ico=e.is_secret?'🔑':(TYPE_ICON[e.type]||'📝');
    const tags=(e.tags||[]).slice(0,4).map(t=>`<span class="tag${e.is_secret?' k':''}">${esc(t)}</span>`).join('');
    const rawTitle=(e.title||'').trim();
    const title=rawTitle&&rawTitle!=='Untitled'?rawTitle:clean(e.summary||'').split('\n')[0].substring(0,72)||'(untitled)';
    const dimTitle=!rawTitle||rawTitle==='Untitled';
    const summary=clean(e.summary||'');
    card.innerHTML=`<div class="cico">${ico}</div><div class="cb"><div class="ct"${dimTitle?' style="color:var(--muted)"':''}>${esc(title)}</div>
      <div class="cs">${esc(summary)}</div>${tags?`<div class="ctags">${tags}</div>`:''}</div>
      <div class="cp">${esc(e.tree_path||'')}</div>`;
    card.onclick=()=>openEntry(e.id);w.appendChild(card);
  });
  c.innerHTML='';c.appendChild(w);c.scrollTop=0;
}

async function openEntry(id){
  const e=await api(`/api/entry/${id}?vault=${state.vault}`);state.detail=e;_secretFields=[];
  const ico=e.is_secret?'🔑':(TYPE_ICON[e.type]||'📝');
  const tags=(e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  let body;
  if(e.is_secret){
    body=`<div class="sfields" id="sfields"><div class="empty" style="padding:18px">🔒 ${e.secret_count||0} protected field(s) — hidden</div></div>
      <button class="btn primary" onclick="revealSecrets(${id})">👁 Reveal</button>
      <div class="snote">🛡️ Stored locally · masked by default · never sent to any cloud AI</div>`;
  }else{
    const isCode=e.type==='code';let ct=esc(e.content||e.raw||'');
    if(e.type==='link')ct=ct.replace(/(https?:\/\/\S+)/g,'<a class="lk" href="$1" target="_blank">$1</a>');
    body=`<div class="body ${isCode?'code':''}">${ct||'<span style="color:var(--hint)">(empty)</span>'}</div>
      ${!isCode?`<button class="btn" style="margin-top:11px" onclick="copyText()">📋 Copy</button>`:''}`;
  }
  document.getElementById('content').innerHTML=`<div class="detail ${e.is_secret?'secret':''}">
    <div class="dhead"><div class="di">${ico}</div>
      <div style="flex:1;min-width:0"><h2>${esc(e.title)}</h2>
        <div class="dsub">${esc(e.type)} · ${esc(e.tree_path||'')} · ${(e.updated||'').slice(0,10)}</div></div>
      <div class="da"><button class="btn" onclick="showList()">← Back</button>
        <button class="btn" onclick="startEdit(${id})">✏️ Edit</button>
        <button class="btn danger" onclick="delEntry(${id})">🗑</button></div>
    </div>${tags?`<div class="dtags">${tags}</div>`:''}${body}</div>`;
}

function startEdit(id){
  const e=state.detail;if(!e)return;
  if(e.is_secret)return startEditSecrets(id);
  document.getElementById('content').innerHTML=`<div class="edit">
    <label>Title</label><input id="e-title" value="${esc(e.title)}">
    <label>Folder (tree path)</label><input id="e-path" value="${esc(e.tree_path||'')}">
    <label>Tags (comma-separated)</label><input id="e-tags" value="${esc((e.tags||[]).join(', '))}">
    <label>Content</label><textarea id="e-content">${esc(e.content||e.raw||'')}</textarea>
    <div class="erow"><button class="btn primary" onclick="saveEdit(${id})">💾 Save</button>
      <button class="btn" onclick="openEntry(${id})">Cancel</button></div></div>`;
}
async function saveEdit(id){
  const tags=document.getElementById('e-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  await api(`/api/entry/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vault:state.vault,title:document.getElementById('e-title').value.trim(),
      tree_path:document.getElementById('e-path').value.trim(),tags,
      content:document.getElementById('e-content').value})});
  toast('Saved');await refreshAll();openEntry(id);
}

let _secretFields=[];
async function revealSecrets(id){
  const d=await api(`/api/entry/${id}/secrets?vault=${state.vault}`);_secretFields=d.secret_fields||[];
  const el=document.getElementById('sfields');el.innerHTML='';
  _secretFields.forEach((f,i)=>{
    const masked='•'.repeat(Math.min(14,(f.value||'').length||8));
    const row=document.createElement('div');row.className='sfield';
    row.innerHTML=`<span class="sl">${esc(f.label||f.kind)}</span>
      <span class="sv masked" id="sv${i}" data-shown="0">${masked}</span>
      <button class="sbtn" data-i="${i}" data-a="t">👁</button><button class="sbtn" data-i="${i}" data-a="c">📋</button>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;
    b.dataset.a==='t'?toggleVal(i):copyVal(_secretFields[i].value)});
}
function toggleVal(i){const el=document.getElementById('sv'+i),v=_secretFields[i].value||'';
  if(el.dataset.shown==='1'){el.textContent='•'.repeat(Math.min(14,v.length||8));el.classList.add('masked');el.dataset.shown='0'}
  else{el.textContent=v;el.classList.remove('masked');el.dataset.shown='1'}}
function copyVal(v){navigator.clipboard.writeText(v);toast('Copied','· clears in 20s');
  clearTimeout(window._clip);window._clip=setTimeout(()=>navigator.clipboard.writeText('').catch(()=>{}),20000)}
function copyText(){const e=state.detail;if(e){navigator.clipboard.writeText(e.content||e.raw||'');toast('Copied')}}

async function startEditSecrets(id){
  if(!_secretFields.length){const d=await api(`/api/entry/${id}/secrets?vault=${state.vault}`);_secretFields=d.secret_fields||[]}
  const e=state.detail;
  const rows=_secretFields.map(f=>secRow(f)).join('');
  document.getElementById('content').innerHTML=`<div class="edit">
    <label>Title</label><input id="e-title" value="${esc(e.title)}">
    <label>Folder</label><input id="e-path" value="${esc(e.tree_path||'')}">
    <label>Secret fields</label><div id="srows">${rows}</div>
    <button class="btn" style="align-self:flex-start" onclick="addSecRow()">+ Add field</button>
    <div class="erow"><button class="btn primary" onclick="saveSecrets(${id})">💾 Save</button>
      <button class="btn" onclick="openEntry(${id})">Cancel</button></div></div>`;
}
function secRow(f){f=f||{label:'',value:'',kind:'password'};
  const opt=k=>`<option value="${k}"${f.kind===k?' selected':''}>${k}</option>`;
  return `<div class="srow"><input class="lbl" placeholder="label" value="${esc(f.label||'')}">
    <input class="val" placeholder="value" value="${esc(f.value||'')}">
    <select class="knd">${opt('password')}${opt('username')}${opt('api_key')}${opt('token')}${opt('meta')}</select>
    <button class="x" onclick="this.parentElement.remove()">✕</button></div>`;
}
function addSecRow(){document.getElementById('srows').insertAdjacentHTML('beforeend',secRow())}
async function saveSecrets(id){
  const fields=[...document.querySelectorAll('#srows .srow')].map(r=>({
    label:r.querySelector('.lbl').value.trim(),value:r.querySelector('.val').value,
    kind:r.querySelector('.knd').value})).filter(f=>f.value);
  await api(`/api/entry/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vault:state.vault,title:document.getElementById('e-title').value.trim(),
      tree_path:document.getElementById('e-path').value.trim()})});
  await api(`/api/entry/${id}/secrets`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vault:state.vault,fields})});
  _secretFields=[];toast('Saved');await refreshAll();openEntry(id);
}

async function delEntry(id){
  await api(`/api/entry/${id}?vault=${state.vault}`,{method:'DELETE'});
  toast('Deleted');await refreshAll();showList();
}

async function doCapture(){
  const ta=document.getElementById('paste'),content=ta.value.trim();if(!content){ta.focus();return}
  const sm=document.getElementById('status-msg');sm.innerHTML=`<span class="spin"></span> organizing…`;
  document.getElementById('cap-btn').disabled=true;
  try{
    const d=await api('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({content,vault:state.vault})});
    ta.value='';ta.style.height='auto';const e=d.entry;
    sm.innerHTML=d.is_secret?`🔑 Secured as <b style="color:var(--amber)">${esc(e.title)}</b> → ${esc(e.tree_path)}`
      :`✅ Filed as <b style="color:var(--green)">${esc(e.title)}</b> → ${esc(e.tree_path)}`;
    setTimeout(()=>sm.innerHTML='',4000);await refreshAll();openEntry(e.id);
  }catch(err){sm.innerHTML=`<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`}
  finally{document.getElementById('cap-btn').disabled=false}
}
async function doUpload(inp){
  if(!inp.files.length)return;const sm=document.getElementById('status-msg');
  sm.innerHTML=`<span class="spin"></span> reading file…`;
  const fd=new FormData();fd.append('file',inp.files[0]);fd.append('vault',state.vault);
  try{const d=await api('/api/upload',{method:'POST',body:fd});
    sm.innerHTML=`📄 Filed <b style="color:var(--green)">${esc(d.entry.title)}</b>`;
    setTimeout(()=>sm.innerHTML='',4000);await refreshAll();openEntry(d.entry.id);
  }catch(err){sm.innerHTML=`<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`}
  inp.value='';
}

let _st;
function onSearch(){clearTimeout(_st);_st=setTimeout(async()=>{
  state.query=document.getElementById('search').value.trim();
  state.view=state.query?'search':'recent';
  await loadEntries();showList()},180)}

async function refreshAll(){await loadVaults();await loadTree();await loadEntries()}

const paste=document.getElementById('paste');
paste.addEventListener('input',()=>{paste.style.height='auto';paste.style.height=Math.min(paste.scrollHeight,160)+'px'});
paste.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doCapture()}});
['dragover','dragleave','drop'].forEach(ev=>document.body.addEventListener(ev,e=>{e.preventDefault();
  document.getElementById('app').classList.toggle('drag',ev==='dragover');
  if(ev==='drop'&&e.dataTransfer.files.length){const i=document.getElementById('file-in');i.files=e.dataTransfer.files;doUpload(i)}}));

(async function init(){await checkHealth();setInterval(checkHealth,15000);
  await refreshAll();showList();paste.focus({preventScroll:true})})();
</script>
</body>
</html>
