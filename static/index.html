<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnemo — paste anything, find everything</title>
<style>
:root {
  --bg:#0f0f10; --s1:#16161a; --s2:#1d1d24; --s3:#25252e;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --text:#e6e6ec; --muted:#8a8aa0; --hint:#55556a;
  --purple:#8b7cf0; --purple-bg:rgba(139,124,240,.13);
  --green:#4eca8b; --green-bg:rgba(78,202,139,.12);
  --red:#e05c6a; --red-bg:rgba(224,92,106,.12);
  --amber:#e8aa40; --amber-bg:rgba(232,170,64,.12);
  --blue:#5a9df5; --blue-bg:rgba(90,157,245,.12);
  --work:#e8aa40; --work-bg:rgba(232,170,64,.13);
  --font:'Segoe UI Variable','Segoe UI',system-ui,sans-serif;
  --mono:'Cascadia Code','Fira Code',Consolas,monospace;
  --r:9px; --r-lg:13px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;overflow:hidden}
.mono{font-family:var(--mono)}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

.app{display:grid;grid-template-rows:auto auto 1fr;height:100vh}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;background:var(--s1);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:30px;height:30px;border-radius:8px;background:var(--purple-bg);
  display:flex;align-items:center;justify-content:center;font-size:17px}
.brand h1{font-size:16px;font-weight:600;letter-spacing:-.01em}
.brand .tag{font-size:11px;color:var(--hint)}
.hdr-right{display:flex;align-items:center;gap:14px}
.vault-switch{display:flex;background:var(--s3);border-radius:20px;padding:3px;gap:2px}
.vault-btn{border:none;background:none;color:var(--muted);font-size:12px;font-weight:500;
  padding:5px 14px;border-radius:18px;transition:.15s;display:flex;align-items:center;gap:6px}
.vault-btn.active{background:var(--purple);color:#fff}
.vault-btn.active.work{background:var(--work);color:#1a1205}
.vault-btn .cnt{font-size:10px;opacity:.7}
#conn{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.dot.up{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
.dot.down{background:var(--red);box-shadow:0 0 0 3px var(--red-bg)}

/* Work banner */
.work-banner{display:none;background:var(--work-bg);border-bottom:1px solid rgba(232,170,64,.25);
  color:var(--work);font-size:12px;padding:6px 22px;text-align:center;font-weight:500}
body.work-mode .work-banner{display:block}

/* Capture zone */
.capture{padding:16px 22px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:10px}
.capture-row{display:flex;gap:10px;align-items:flex-start}
#paste{flex:1;min-height:46px;max-height:200px;background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:inherit;font-size:14px;padding:12px 14px;
  resize:vertical;line-height:1.5;transition:.15s}
#paste:focus{outline:none;border-color:var(--purple);background:var(--s3)}
#paste::placeholder{color:var(--hint)}
.btn{border:none;border-radius:var(--r);padding:0 20px;height:46px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#9a8cf5}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:var(--s3);color:var(--muted);height:40px;padding:0 14px;font-weight:500;font-size:13px}
.btn-ghost:hover{background:var(--s2);color:var(--text)}
.capture-foot{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--hint);min-height:18px}
#status-msg{display:flex;align-items:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--purple);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Body */
.body{display:grid;grid-template-columns:248px 1fr;overflow:hidden}
.tree-pane{background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;padding:14px 10px}
.tree-head{display:flex;align-items:center;justify-content:space-between;padding:0 8px 8px}
.tree-head span{font-size:10px;font-weight:600;letter-spacing:.07em;color:var(--hint);text-transform:uppercase}
.tnode{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);
  color:var(--muted);font-size:13px;transition:.12s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.tnode:hover{background:var(--s3);color:var(--text)}
.tnode.active{background:var(--purple-bg);color:var(--purple);font-weight:500}
.tnode .ico{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.tnode .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnode .cnt{font-size:10px;background:var(--s3);border-radius:5px;padding:1px 6px;color:var(--muted)}
.tnode.depth1{padding-left:24px;font-size:12px}
.tnode.depth2{padding-left:38px;font-size:12px}

/* Main */
.main{overflow-y:auto;padding:18px 22px}
.search-bar{position:relative;margin-bottom:16px}
#search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:13px;padding:10px 14px 10px 38px;transition:.15s}
#search:focus{outline:none;border-color:var(--purple)}
.search-bar .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:14px}
.view-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.view-head h2{font-size:14px;font-weight:600}
.view-head .meta{font-size:12px;color:var(--hint)}

.cards{display:flex;flex-direction:column;gap:8px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:13px 15px;cursor:pointer;transition:.13s;display:flex;gap:12px;align-items:flex-start}
.card:hover{border-color:var(--border2);background:var(--s3)}
.card .cico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;background:var(--s3)}
.card.secret .cico{background:var(--amber-bg)}
.card .cbody{flex:1;min-width:0}
.card .ct{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .cs{font-size:12px;color:var(--muted);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .ctags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.tag{font-size:10px;background:var(--s3);border:1px solid var(--border);border-radius:11px;
  padding:2px 8px;color:var(--muted)}
.card.secret .tag.k{background:var(--amber-bg);color:var(--amber);border-color:transparent}
.card .cpath{font-size:10px;color:var(--hint);margin-left:auto;flex-shrink:0}

.empty{text-align:center;color:var(--hint);padding:60px 20px;font-size:13px}
.empty .big{font-size:34px;margin-bottom:12px;opacity:.5}

/* Detail */
.detail{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px}
.detail-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.detail-head .dico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:19px;background:var(--s3);flex-shrink:0}
.detail.secret .dico{background:var(--amber-bg)}
.detail-head h2{font-size:18px;font-weight:600;margin-bottom:3px}
.detail-head .dsub{font-size:12px;color:var(--muted)}
.detail-actions{margin-left:auto;display:flex;gap:7px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.detail-content{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;
  max-height:46vh;overflow-y:auto}
.detail-content.code{font-family:var(--mono);font-size:12.5px}
a.link-out{color:var(--blue)}

/* Secret fields */
.sfields{display:flex;flex-direction:column;gap:10px}
.sfield{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;display:flex;align-items:center;gap:12px}
.sfield .sl{font-size:11px;color:var(--muted);width:90px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em}
.sfield .sv{flex:1;font-family:var(--mono);font-size:13px;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:1px}
.sfield .sv.masked{letter-spacing:3px}
.sfield .sbtn{background:var(--s3);border:none;color:var(--muted);border-radius:6px;
  padding:5px 9px;font-size:12px;transition:.12s}
.sfield .sbtn:hover{background:var(--purple-bg);color:var(--purple)}
.secret-note{font-size:11px;color:var(--hint);margin-top:12px;display:flex;align-items:center;gap:6px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;
  font-size:13px;color:var(--text);opacity:0;transition:.25s;pointer-events:none;z-index:100;
  display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .clr{font-size:11px;color:var(--amber)}
.drag-over #paste{border-color:var(--purple);border-style:dashed;background:var(--purple-bg)}
</style>
</head>
<body>
<div class="app" id="app">

  <header class="hdr">
    <div class="brand">
      <div class="logo">🗂️</div>
      <div>
        <h1>Mnemo</h1>
        <div class="tag">paste anything · find everything</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="vault-switch" id="vault-switch"></div>
      <div id="conn"><span class="dot" id="conn-dot"></span><span id="conn-txt">…</span></div>
    </div>
  </header>

  <div class="work-banner">🔒 WORK VAULT — company data stays local · no cloud AI · §7 confidentiality</div>

  <section class="capture">
    <div class="capture-row">
      <textarea id="paste" placeholder="Paste anything — a password, a link, a code snippet, notes, a login block…  (Ctrl+Enter to capture)"></textarea>
      <button class="btn btn-primary" id="cap-btn" onclick="doCapture()">
        <span>⚡</span> Capture
      </button>
    </div>
    <div class="capture-foot">
      <span id="status-msg"></span>
      <label class="btn-ghost" style="margin-left:auto;cursor:pointer">
        📎 Upload file / PDF
        <input type="file" id="file-in" style="display:none" onchange="doUpload(this)">
      </label>
    </div>
  </section>

  <div class="body">
    <aside class="tree-pane">
      <div class="tree-head"><span>Tree</span></div>
      <div id="tree"></div>
    </aside>

    <main class="main">
      <div class="search-bar">
        <span class="si">🔍</span>
        <input id="search" placeholder="Search everything…" oninput="onSearch()" autocomplete="off">
      </div>
      <div class="view-head">
        <h2 id="view-title">Recent</h2>
        <span class="meta" id="view-meta"></span>
      </div>
      <div id="content"></div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = location.origin;
const state = { vault:'personal', vaults:[], tree:[], activePath:'', query:'', detail:null };
const TYPE_ICON = {note:'📝',link:'🔗',code:'💻',doc:'📄',task:'✅',reference:'📚',credential:'🔑',file:'📎'};

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(msg, clearMsg){
  const t=document.getElementById('toast');
  t.innerHTML=esc(msg)+(clearMsg?` <span class="clr">${esc(clearMsg)}</span>`:'');
  t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);
}

async function api(path, opts){
  const r=await fetch(API+path, opts);
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.status);
  return r.json();
}

async function checkHealth(){
  const dot=document.getElementById('conn-dot'), txt=document.getElementById('conn-txt');
  try{ await api('/api/health'); dot.className='dot up'; txt.textContent='connected'; }
  catch{ dot.className='dot down'; txt.textContent='offline'; }
}

async function loadVaults(){
  const d=await api('/api/vaults'); state.vaults=d.vaults;
  const sw=document.getElementById('vault-switch'); sw.innerHTML='';
  d.vaults.forEach(v=>{
    const b=document.createElement('button');
    b.className='vault-btn'+(v.name===state.vault?' active':'')+(v.name==='work'?' work':'');
    b.innerHTML=`${v.name==='work'?'🔒':'👤'} ${v.name.charAt(0).toUpperCase()+v.name.slice(1)} <span class="cnt">${v.entries}</span>`;
    b.onclick=()=>switchVault(v.name);
    sw.appendChild(b);
  });
}

function switchVault(name){
  state.vault=name; state.activePath=''; state.query='';
  document.getElementById('search').value='';
  document.body.classList.toggle('work-mode', name==='work');
  loadVaults(); loadTree(); loadEntries(); showList();
}

async function loadTree(){
  const d=await api('/api/tree?vault='+state.vault); state.tree=d.tree;
  const el=document.getElementById('tree'); el.innerHTML='';
  const all=document.createElement('button');
  const total=state.tree.reduce((a,t)=>a+t.count,0);
  all.className='tnode'+(state.activePath===''?' active':'');
  all.innerHTML=`<span class="ico">🗃️</span><span class="nm">All notes</span><span class="cnt">${total}</span>`;
  all.onclick=()=>{state.activePath='';document.getElementById('search').value='';state.query='';loadEntries();showList();markTree()};
  el.appendChild(all);
  // collapse to a sorted folder list
  state.tree.forEach(t=>{
    const depth=Math.min((t.path.match(/\//g)||[]).length,2);
    const name=t.path.split('/').pop();
    const b=document.createElement('button');
    b.className='tnode depth'+depth+(state.activePath===t.path?' active':'');
    b.dataset.path=t.path;
    b.innerHTML=`<span class="ico">${depth?'└':'📁'}</span><span class="nm">${esc(name)}</span><span class="cnt">${t.count}</span>`;
    b.onclick=()=>{state.activePath=t.path;state.query='';document.getElementById('search').value='';loadEntries();showList();markTree()};
    el.appendChild(b);
  });
}
function markTree(){
  document.querySelectorAll('.tnode').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.tnode').forEach(n=>{
    if((n.dataset.path||'')===state.activePath) n.classList.add('active');
    if(state.activePath===''&&!n.dataset.path) n.classList.add('active');
  });
}

let entries=[];
async function loadEntries(){
  let path=`/api/entries?vault=${state.vault}`;
  if(state.query) path+='&q='+encodeURIComponent(state.query);
  else if(state.activePath) path+='&tree='+encodeURIComponent(state.activePath);
  const d=await api(path); entries=d.entries;
}

function showList(){
  state.detail=null;
  const c=document.getElementById('content');
  document.getElementById('view-title').textContent =
    state.query?`Search: "${state.query}"`:(state.activePath||'Recent');
  document.getElementById('view-meta').textContent = entries.length+' item'+(entries.length===1?'':'s');
  if(!entries.length){
    c.innerHTML=`<div class="empty"><div class="big">🗂️</div>Nothing here yet.<br>Paste something above and Mnemo will file it for you.</div>`;
    return;
  }
  const wrap=document.createElement('div');wrap.className='cards';
  entries.forEach(e=>{
    const card=document.createElement('div');
    card.className='card'+(e.is_secret?' secret':'');
    const ico=e.is_secret?'🔑':(TYPE_ICON[e.type]||'📝');
    const tags=(e.tags||[]).slice(0,4).map(t=>`<span class="tag${e.is_secret?' k':''}">${esc(t)}</span>`).join('');
    card.innerHTML=`<div class="cico">${ico}</div>
      <div class="cbody">
        <div class="ct">${esc(e.title)}</div>
        <div class="cs">${esc(e.summary||'')}</div>
        ${tags?`<div class="ctags">${tags}</div>`:''}
      </div>
      <div class="cpath">${esc(e.tree_path||'')}</div>`;
    card.onclick=()=>openEntry(e.id);
    wrap.appendChild(card);
  });
  c.innerHTML='';c.appendChild(wrap);
}

async function openEntry(id){
  const e=await api(`/api/entry/${id}?vault=${state.vault}`); state.detail=e;
  const c=document.getElementById('content');
  const ico=e.is_secret?'🔑':(TYPE_ICON[e.type]||'📝');
  const tags=(e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  let bodyHtml;
  if(e.is_secret){
    bodyHtml=`<div class="sfields" id="sfields"><div class="empty" style="padding:20px">🔒 ${e.secret_count||0} protected field(s) — hidden</div></div>
      <button class="btn btn-primary" style="margin-top:14px;height:40px" onclick="revealSecrets(${id})">👁 Reveal</button>
      <div class="secret-note">🛡️ Stored locally · masked by default · never sent to any cloud AI</div>`;
  } else {
    const isCode=e.type==='code';
    let content=esc(e.content||e.raw||'');
    if(e.type==='link'){content=content.replace(/(https?:\/\/\S+)/g,'<a class="link-out" href="$1" target="_blank">$1</a>');}
    bodyHtml=`<div class="detail-content ${isCode?'code':''}">${content}</div>`;
    if(!isCode) bodyHtml+=`<button class="btn-ghost" style="margin-top:12px" onclick="copyText(${id})">📋 Copy</button>`;
  }
  c.innerHTML=`<div class="detail ${e.is_secret?'secret':''}">
    <div class="detail-head">
      <div class="dico">${ico}</div>
      <div style="flex:1;min-width:0">
        <h2>${esc(e.title)}</h2>
        <div class="dsub">${esc(e.type)} · ${esc(e.tree_path||'')} · ${(e.updated||'').slice(0,10)}</div>
      </div>
      <div class="detail-actions">
        <button class="btn-ghost" onclick="showList()">← Back</button>
        <button class="btn-ghost" onclick="delEntry(${id})">🗑</button>
      </div>
    </div>
    ${tags?`<div class="detail-tags">${tags}</div>`:''}
    ${bodyHtml}
  </div>`;
}

// Secret values are held in a JS array and referenced by index — never inlined
// into HTML — so any characters (quotes, backslashes, <>) are handled safely.
let _secretVals=[];
async function revealSecrets(id){
  const d=await api(`/api/entry/${id}/secrets?vault=${state.vault}`);
  _secretVals=d.secret_fields.map(f=>f.value||'');
  const el=document.getElementById('sfields'); el.innerHTML='';
  d.secret_fields.forEach((f,i)=>{
    const row=document.createElement('div');row.className='sfield';
    const masked='•'.repeat(Math.min(12,(f.value||'').length||8));
    row.innerHTML=`<span class="sl">${esc(f.label||f.kind)}</span>
      <span class="sv masked" id="sv${i}" data-shown="0">${masked}</span>
      <button class="sbtn" data-i="${i}" data-act="toggle" aria-label="Show/hide">👁</button>
      <button class="sbtn" data-i="${i}" data-act="copy" aria-label="Copy">📋</button>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.sbtn').forEach(b=>{
    b.onclick=()=>{ const i=+b.dataset.i;
      if(b.dataset.act==='toggle') toggleVal(i); else copyVal(_secretVals[i]); };
  });
}
function toggleVal(i){
  const el=document.getElementById('sv'+i); const val=_secretVals[i]||'';
  if(el.dataset.shown==='1'){el.textContent='•'.repeat(Math.min(12,val.length||8));el.classList.add('masked');el.dataset.shown='0';}
  else{el.textContent=val;el.classList.remove('masked');el.dataset.shown='1';}
}
function copyVal(val){
  navigator.clipboard.writeText(val);
  toast('Copied','· clears in 20s');
  clearTimeout(window._clip);window._clip=setTimeout(()=>navigator.clipboard.writeText('').catch(()=>{}),20000);
}
function copyText(id){
  const e=state.detail; if(!e)return;
  navigator.clipboard.writeText(e.content||e.raw||''); toast('Copied to clipboard');
}

async function delEntry(id){
  await api(`/api/entry/${id}?vault=${state.vault}`,{method:'DELETE'});
  toast('Deleted'); await refreshAll(); showList();
}

async function doCapture(){
  const ta=document.getElementById('paste'); const content=ta.value.trim();
  if(!content){ta.focus();return;}
  const sm=document.getElementById('status-msg');
  sm.innerHTML=`<span class="spin"></span> organizing…`;
  document.getElementById('cap-btn').disabled=true;
  try{
    const d=await api('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({content,vault:state.vault})});
    ta.value='';
    const e=d.entry;
    sm.innerHTML=d.is_secret
      ? `🔑 Secured as <b style="color:var(--amber)">${esc(e.title)}</b> → ${esc(e.tree_path)}`
      : `✅ Filed as <b style="color:var(--green)">${esc(e.title)}</b> → ${esc(e.tree_path)}`;
    setTimeout(()=>sm.innerHTML='',4000);
    await refreshAll(); openEntry(e.id);
  }catch(err){ sm.innerHTML=`<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`; }
  finally{ document.getElementById('cap-btn').disabled=false; }
}

async function doUpload(input){
  if(!input.files.length)return;
  const sm=document.getElementById('status-msg');
  sm.innerHTML=`<span class="spin"></span> reading file…`;
  const fd=new FormData(); fd.append('file',input.files[0]); fd.append('vault',state.vault);
  try{
    const d=await api('/api/upload',{method:'POST',body:fd});
    sm.innerHTML=`📄 Filed <b style="color:var(--green)">${esc(d.entry.title)}</b>`;
    setTimeout(()=>sm.innerHTML='',4000);
    await refreshAll(); openEntry(d.entry.id);
  }catch(err){ sm.innerHTML=`<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`; }
  input.value='';
}

let _searchT;
function onSearch(){
  clearTimeout(_searchT);
  _searchT=setTimeout(async()=>{
    state.query=document.getElementById('search').value.trim();
    if(state.query) state.activePath='';
    await loadEntries(); showList(); markTree();
  },180);
}

async function refreshAll(){ await loadVaults(); await loadTree(); await loadEntries(); markTree(); }

// Ctrl+Enter to capture; drag-drop file
document.getElementById('paste').addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();doCapture();}
});
['dragover','dragleave','drop'].forEach(ev=>document.body.addEventListener(ev,e=>{
  e.preventDefault();
  document.getElementById('app').classList.toggle('drag-over',ev==='dragover');
  if(ev==='drop'&&e.dataTransfer.files.length){
    const inp=document.getElementById('file-in'); inp.files=e.dataTransfer.files; doUpload(inp);
  }
}));

(async function init(){
  await checkHealth(); setInterval(checkHealth,15000);
  await loadVaults(); await loadTree(); await loadEntries(); showList(); markTree();
  document.getElementById('paste').focus();
})();
</script>
